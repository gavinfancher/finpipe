services:
  redpanda:
    image: redpandadata/redpanda:latest
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=512M
      - --advertise-kafka-addr=redpanda:9092
    ports:
      - "9092:9092"
    volumes:
      - redpanda_data:/var/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

  redpanda-console:
    image: redpandadata/console:latest
    restart: unless-stopped
    ports:
      - "8888:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run finpipe-api
    volumes:
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared-credentials.json:/etc/cloudflared/credentials.json:ro
      - ./cloudflared-cert.pem:/etc/cloudflared/cert.pem:ro
    depends_on:
      ws-relay:
        condition: service_started

  ws-relay:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.streaming
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      KAFKA_BOOTSTRAP: redpanda:9092
      JWT_SECRET: ${JWT_SECRET}
      BETA_KEY: ${BETA_KEY}
      MASSIVE_API_KEY: ${MASSIVE_API_KEY}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SKIP_SCHEMA_INIT: "false"
    depends_on:
      redpanda:
        condition: service_healthy

  control:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.streaming
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "streaming.control"]
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CONTROL_POLL_INTERVAL: "5"
      MIN_NODES: "1"
      CONTROL_PORT: "8081"
    depends_on:
      redpanda:
        condition: service_healthy

  ingest:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.streaming
    command: ["uv", "run", "python", "-m", "streaming.ingest"]
    restart: unless-stopped
    environment:
      MASSIVE_API_KEY: ${MASSIVE_API_KEY}
      KAFKA_BOOTSTRAP: redpanda:9092
      REDIS_URL: ${REDIS_URL}
      CONTROL_URL: http://control:8081
    depends_on:
      redpanda:
        condition: service_healthy
      control:
        condition: service_started

  dagster-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
    volumes:
      - dagster_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster"]
      interval: 5s
      timeout: 5s
      retries: 5

  dagster-code:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.dagster
    image: finpipe-dagster
    restart: unless-stopped
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_PG_USER: dagster
      DAGSTER_PG_PASSWORD: dagster
      DAGSTER_PG_HOST: dagster-postgres
      DAGSTER_PG_DB: dagster
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MASSIVE_API_KEY: ${MASSIVE_API_KEY}
    depends_on:
      dagster-postgres:
        condition: service_healthy
    volumes:
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
      - ./workspace.yaml:/opt/dagster/dagster_home/workspace.yaml:ro
      - ../../dagster/definitions.py:/workspace/dagster/definitions.py:ro
      - ../../dagster/jobs:/workspace/dagster/jobs:ro
      - ../../dagster/assets:/workspace/dagster/assets:ro
      - ../../dagster/resources:/workspace/dagster/resources:ro
      - ../../dagster/sensors:/workspace/dagster/sensors:ro
      - ../../dagster/transforms:/workspace/dagster/transforms:ro
      - ../../common:/workspace/common:ro
      - ../../infra:/workspace/infra:ro
    command: ["uv", "run", "dagster", "code-server", "start", "-h", "0.0.0.0", "-p", "4000", "-f", "definitions.py"]

  dagster-webserver:
    image: finpipe-dagster
    restart: unless-stopped
    depends_on:
      dagster-postgres:
        condition: service_healthy
      dagster-code:
        condition: service_started
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_PG_USER: dagster
      DAGSTER_PG_PASSWORD: dagster
      DAGSTER_PG_HOST: dagster-postgres
      DAGSTER_PG_DB: dagster
    volumes:
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
      - ./workspace.yaml:/opt/dagster/dagster_home/workspace.yaml:ro
    ports: ["3000:3000"]
    command: ["uv", "run", "dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "/opt/dagster/dagster_home/workspace.yaml"]

  dagster-daemon:
    image: finpipe-dagster
    restart: unless-stopped
    depends_on:
      dagster-postgres:
        condition: service_healthy
      dagster-code:
        condition: service_started
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_PG_USER: dagster
      DAGSTER_PG_PASSWORD: dagster
      DAGSTER_PG_HOST: dagster-postgres
      DAGSTER_PG_DB: dagster
    volumes:
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
      - ./workspace.yaml:/opt/dagster/dagster_home/workspace.yaml:ro
    command: ["uv", "run", "dagster-daemon", "run", "-w", "/opt/dagster/dagster_home/workspace.yaml"]

volumes:
  redpanda_data:
  dagster_pg_data:
