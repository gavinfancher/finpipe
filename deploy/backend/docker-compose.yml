x-ingest: &ingest
  build:
    context: ../..
    dockerfile: deploy/backend/Dockerfile
  command: ["uv", "run", "python", "-m", "streaming.ingest"]
  restart: unless-stopped
  environment: &ingest-env
    MASSIVE_API_KEY: ${MASSIVE_API_KEY}
    KAFKA_BOOTSTRAP: redpanda:9092
    REDIS_URL: redis://redis:6379
    CONTROL_URL: http://control:8081
  depends_on:
    redpanda:
      condition: service_healthy
    redis:
      condition: service_healthy
    control:
      condition: service_started

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: finpipe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:latest
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=512M
      - --advertise-kafka-addr=redpanda:9092
    ports:
      - "9092:9092"
    volumes:
      - redpanda_data:/var/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

  redpanda-console:
    image: redpandadata/console:latest
    restart: unless-stopped
    ports:
      - "8888:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ws-relay:
    build:
      context: ../..
      dockerfile: deploy/backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/finpipe
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP: redpanda:9092
      JWT_SECRET: ${JWT_SECRET}
      BETA_KEY: ${BETA_KEY}
      MASSIVE_API_KEY: ${MASSIVE_API_KEY}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy

  control:
    build:
      context: ../..
      dockerfile: deploy/backend/Dockerfile
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "streaming.control"]
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/finpipe
      REDIS_URL: redis://redis:6379
      CONTROL_POLL_INTERVAL: "5"
      MIN_NODES: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Ingestion nodes — add/remove entries to scale.
  # Each needs a unique NODE_ID matching the control node's assignment scheme.
  ingest-0:
    <<: *ingest
    environment:
      <<: *ingest-env
      NODE_ID: ingest-0

volumes:
  postgres_data:
  redpanda_data:
  redis_data:
