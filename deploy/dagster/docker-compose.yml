services:
  dagster-postgres:
    image: postgres:16-alpine
    container_name: dagster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
    networks: [dagster]
    volumes: [pg_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster"]
      interval: 5s
      timeout: 5s
      retries: 5

  dagster-code:
    build:
      context: ../..
      dockerfile: deploy/dagster/Dockerfile
    container_name: dagster-code
    restart: unless-stopped
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_PG_USER: dagster
      DAGSTER_PG_PASSWORD: dagster
      DAGSTER_PG_HOST: dagster-postgres
      DAGSTER_PG_DB: dagster
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:-}
      MASSIVE_API_KEY: ${MASSIVE_API_KEY:-}
    networks: [dagster]
    depends_on:
      dagster-postgres: { condition: service_healthy }
    volumes:
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
      - ./workspace.yaml:/opt/dagster/dagster_home/workspace.yaml:ro
    command:
      - uv
      - run
      - dagster
      - code-server
      - start
      - -h
      - "0.0.0.0"
      - -p
      - "4000"
      - -f
      - definitions.py

  dagster-webserver:
    build:
      context: ../..
      dockerfile: deploy/dagster/Dockerfile
    container_name: dagster-webserver
    restart: unless-stopped
    depends_on:
      dagster-postgres: { condition: service_healthy }
      dagster-code: { condition: service_started }
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_PG_USER: dagster
      DAGSTER_PG_PASSWORD: dagster
      DAGSTER_PG_HOST: dagster-postgres
      DAGSTER_PG_DB: dagster
    networks: [dagster]
    volumes:
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
      - ./workspace.yaml:/opt/dagster/dagster_home/workspace.yaml:ro
    ports: ["3000:3000"]
    command:
      - uv
      - run
      - dagster-webserver
      - -h
      - "0.0.0.0"
      - -p
      - "3000"
      - -w
      - /opt/dagster/dagster_home/workspace.yaml

  dagster-daemon:
    build:
      context: ../..
      dockerfile: deploy/dagster/Dockerfile
    container_name: dagster-daemon
    restart: unless-stopped
    depends_on:
      dagster-postgres: { condition: service_healthy }
      dagster-code: { condition: service_started }
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_PG_USER: dagster
      DAGSTER_PG_PASSWORD: dagster
      DAGSTER_PG_HOST: dagster-postgres
      DAGSTER_PG_DB: dagster
    networks: [dagster]
    volumes:
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
      - ./workspace.yaml:/opt/dagster/dagster_home/workspace.yaml:ro
    command:
      - uv
      - run
      - dagster-daemon
      - run

volumes:
  pg_data:

networks:
  dagster:
