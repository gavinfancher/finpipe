services:
  redpanda:
    image: redpandadata/redpanda:latest
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=512M
      - --advertise-kafka-addr=redpanda:9092
    ports:
      - "9092:9092"
    volumes:
      - redpanda_data:/var/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

  redpanda-console:
    image: redpandadata/console:latest
    restart: unless-stopped
    ports:
      - "8888:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy

  ws-relay:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      KAFKA_BOOTSTRAP: redpanda:9092
      JWT_SECRET: ${JWT_SECRET}
      BETA_KEY: ${BETA_KEY}
      MASSIVE_API_KEY: ${MASSIVE_API_KEY}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SKIP_SCHEMA_INIT: "false"
    depends_on:
      redpanda:
        condition: service_healthy

  control:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "streaming.control"]
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CONTROL_POLL_INTERVAL: "5"
      MIN_NODES: "1"
      CONTROL_PORT: "8081"
    depends_on:
      redpanda:
        condition: service_healthy

  ingest:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    command: ["uv", "run", "python", "-m", "streaming.ingest"]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MASSIVE_API_KEY: ${MASSIVE_API_KEY}
      KAFKA_BOOTSTRAP: redpanda:9092
      REDIS_URL: ${REDIS_URL}
      CONTROL_URL: http://control:8081
    depends_on:
      redpanda:
        condition: service_healthy
      control:
        condition: service_started

volumes:
  redpanda_data:
