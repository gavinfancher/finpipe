name: Deploy to EC2

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "frontend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          if echo "$CHANGED" | grep -qE '^(dagster/|common/)'; then
            echo "dagster=true" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -qvE '^(dagster/)'; then
            echo "streaming=true" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -q 'cloudflared-config.yml'; then
            echo "cloudflared=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get EC2 IP
        id: ec2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          IP=$(aws ec2 describe-instances \
            --instance-ids ${{ vars.EC2_INSTANCE_ID }} \
            --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
          echo "ip=$IP" >> "$GITHUB_OUTPUT"

      - name: Deploy
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > key.pem
          chmod 600 key.pem

          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@${{ steps.ec2.outputs.ip }} \
            "cd /home/ubuntu/finpipe && git pull"

          if [ "${{ steps.changes.outputs.streaming }}" = "true" ]; then
            ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@${{ steps.ec2.outputs.ip }} \
              "cd /home/ubuntu/finpipe/deploy/ec2 && sudo docker compose up --build -d"
          elif [ "${{ steps.changes.outputs.dagster }}" = "true" ]; then
            ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@${{ steps.ec2.outputs.ip }} \
              "cd /home/ubuntu/finpipe/deploy/ec2 && sudo docker compose up --build -d dagster-code && sudo docker compose restart dagster-webserver dagster-daemon"
          fi

          if [ "${{ steps.changes.outputs.cloudflared }}" = "true" ]; then
            ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@${{ steps.ec2.outputs.ip }} \
              "cd /home/ubuntu/finpipe/deploy/ec2 && sudo docker compose restart cloudflared"
          fi

          rm key.pem
