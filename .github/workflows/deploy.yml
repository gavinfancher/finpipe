name: Deploy to EC2

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "frontend/**"
  workflow_dispatch:
    inputs:
      compose_rebuild:
        type: boolean
        description: "Full stack — docker compose up --build -d"
        default: false
      restart_dagster:
        type: boolean
        description: "Restart dagster-code, dagster-webserver, dagster-daemon"
        default: true
      sync_spark_scripts:
        type: boolean
        description: "Upload dagster/spark/*.py to s3://finpipe-lakehouse/scripts/ (EMR drivers)"
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we can diff the whole push (before..after) and resolve any parent SHA.
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "streaming=${{ github.event.inputs.compose_rebuild }}" >> "$GITHUB_OUTPUT"
            echo "dagster_deps=false" >> "$GITHUB_OUTPUT"
            echo "dagster_reload=${{ github.event.inputs.restart_dagster }}" >> "$GITHUB_OUTPUT"
            echo "cloudflared=false" >> "$GITHUB_OUTPUT"
            echo "spark_scripts=${{ github.event.inputs.sync_spark_scripts }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
            || ! git rev-parse --verify "$BEFORE^{commit}" >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED=$(git diff --name-only "$BEFORE" "$AFTER")
          fi

          if echo "$CHANGED" | grep -qE '^(deploy/|common/|streaming/)'; then
            echo "streaming=true" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -qE '(dagster|common)/pyproject.toml'; then
            echo "dagster_deps=true" >> "$GITHUB_OUTPUT"
          fi
          # Bind-mounted code: pull updates files but the code server keeps old defs until restart.
          if echo "$CHANGED" | grep -qE '^(dagster/|infra/)'; then
            echo "dagster_reload=true" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -q 'cloudflared-config.yml'; then
            echo "cloudflared=true" >> "$GITHUB_OUTPUT"
          fi
          # Always publish EMR driver scripts on every main push so S3 matches repo tip
          # (avoids missing uploads when spark/ changed in an earlier commit of the same push).
          echo "spark_scripts=true" >> "$GITHUB_OUTPUT"

      - name: Get EC2 IP
        id: ec2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          IP=$(aws ec2 describe-instances \
            --instance-ids ${{ vars.EC2_INSTANCE_ID }} \
            --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
          echo "ip=$IP" >> "$GITHUB_OUTPUT"

      - name: Deploy
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ubuntu@${{ steps.ec2.outputs.ip }}
          STREAMING: ${{ steps.changes.outputs.streaming }}
          DAGSTER_DEPS: ${{ steps.changes.outputs.dagster_deps }}
          DAGSTER_RELOAD: ${{ steps.changes.outputs.dagster_reload }}
          CLOUDFLARED: ${{ steps.changes.outputs.cloudflared }}
          SPARK_SCRIPTS: ${{ steps.changes.outputs.spark_scripts }}
        run: |
          echo "$SSH_KEY" > key.pem
          chmod 600 key.pem
          SSH="ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -i key.pem $HOST"

          $SSH bash -s "$STREAMING" "$DAGSTER_DEPS" "$DAGSTER_RELOAD" "$CLOUDFLARED" "$SPARK_SCRIPTS" <<'REMOTE'
            set -e
            STREAMING=$1 DAGSTER_DEPS=$2 DAGSTER_RELOAD=$3 CLOUDFLARED=$4 SPARK_SCRIPTS=$5
            cd /home/ubuntu/finpipe
            git pull

            if [ "$SPARK_SCRIPTS" = "true" ]; then
              for f in dagster/spark/*.py; do
                [ -f "$f" ] || continue
                aws s3 cp "$f" "s3://finpipe-lakehouse/scripts/$(basename "$f")"
              done
            fi

            if [ "$STREAMING" = "true" ]; then
              cd deploy/ec2 && sudo docker compose up --build -d
            fi

            if [ "$DAGSTER_DEPS" = "true" ]; then
              cd /home/ubuntu/finpipe/deploy/ec2 && sudo docker compose up --build -d dagster-code && sudo docker compose restart dagster-webserver dagster-daemon
            elif [ "$DAGSTER_RELOAD" = "true" ]; then
              cd /home/ubuntu/finpipe/deploy/ec2 && sudo docker compose restart dagster-code dagster-webserver dagster-daemon
            fi

            if [ "$CLOUDFLARED" = "true" ]; then
              cd /home/ubuntu/finpipe/deploy/ec2 && sudo docker compose restart cloudflared
            fi
          REMOTE

          rm key.pem
