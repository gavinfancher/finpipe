name: Deploy to EC2

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "frontend/**"
      - "dagster/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get EC2 IP
        id: ec2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=finpipe-streaming" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
          echo "ip=$IP" >> "$GITHUB_OUTPUT"

      - name: Deploy
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > key.pem
          chmod 600 key.pem
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@${{ steps.ec2.outputs.ip }} \
            "cd /home/ubuntu/finpipe && git pull && cd deploy/ec2 && sudo docker compose up --build -d"
          rm key.pem
